name: Validate Design Tokens

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-tokens:
    name: Build and validate design tokens
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python validation dependency
        run: pip install -r requirements-dev.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh token metadata
        id: metadata
        run: npm run tokens:metadata

      - name: Build platform deliverables
        id: build
        run: npm run tokens:build

      - name: Validate DTCG schema
        id: schema
        run: npm run tokens:validate

      - name: Lint generated platform deliverables
        id: lint
        run: npm run tokens:lint

      - name: Validate component manifest and contrast
        id: manifest
        run: npm run validate

      - name: Run regression suite
        id: tests
        run: npm test

      - name: Generate governance reports
        id: governance
        run: npm run tokens:govern

      - name: Agent 2 — propose missing tokens
        id: agent2
        continue-on-error: true
        run: python3 scripts/agents/token-generator.py --full

      - name: Agent 3 — report hardcoded values
        id: agent3
        continue-on-error: true
        run: python3 scripts/agents/token-migrate.py --full

      - name: Agent 4 — generate token diff report
        id: agent4
        continue-on-error: true
        run: python3 scripts/agents/token-diff-reporter.py

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-validation-reports
          path: |
            logs/
            TOKENS-CHANGELOG.md
            TOKENS-HEALTH.md
            01-tokens/tokens-coverage-matrix.json
            build/build-report.json
          retention-days: 30

      - name: Comment pull request with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = [
              ['Metadata', '${{ steps.metadata.outcome }}'],
              ['Build', '${{ steps.build.outcome }}'],
              ['Schema', '${{ steps.schema.outcome }}'],
              ['Lint', '${{ steps.lint.outcome }}'],
              ['Manifest and contrast', '${{ steps.manifest.outcome }}'],
              ['Tests', '${{ steps.tests.outcome }}'],
              ['Governance', '${{ steps.governance.outcome }}'],
              ['Agent 2 (advisory)', '${{ steps.agent2.outcome }}'],
              ['Agent 3 (advisory)', '${{ steps.agent3.outcome }}'],
              ['Agent 4 (advisory)', '${{ steps.agent4.outcome }}'],
            ];
            const icon = (outcome) => outcome === 'success' ? '✅' : outcome === 'skipped' ? '⏭️' : '⚠️';
            const body = [
              '## Validación de design tokens',
              '',
              ...results.map(([name, outcome]) => `- ${icon(outcome)} ${name}: ${outcome}`),
              '',
              'Los controles de metadata, build, esquema, lint, manifiesto, pruebas y gobernanza bloquean el flujo. Los agentes 2–4 generan propuestas e informes para revisión humana.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
